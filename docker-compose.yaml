version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    container_name: homeia-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homeia_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homeia_password}
      POSTGRES_DB: ${POSTGRES_DB:-homeia_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homeia-network

  redis:
    image: redis:7-alpine
    container_name: homeia-redis
    ports:
      - "6379:6379"
    networks:
      - homeia-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: homeia-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    networks:
      - homeia-network

  # Core Services
  api-gateway:
    build: { context: ./apps/api-gateway }
    ports: [ "3000:3000" ]
    environment: [ PORT=3000 ]
    networks: [ homeia-network ]

  auth-service:
    build: { context: ./apps/auth-service }
    ports: [ "3002:3002" ]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-homeia_user}:${POSTGRES_PASSWORD:-homeia_password}@postgres:5432/${POSTGRES_DB:-homeia_db}
      - JWT_SECRET=${JWT_SECRET:-secret}
      - PORT=3002
    networks: [ homeia-network ]

  project-service:
    build: { context: ./apps/project-service }
    ports: [ "3003:3003" ]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=3003
    networks: [ homeia-network ]

  # Additional Microservices
  billing-service:
    build: { context: ./apps/billing-service }
    ports: [ "3004:3000" ]
    networks: [ homeia-network ]

  budget-service:
    build: { context: ./apps/budget-service }
    ports: [ "3005:3000" ]
    networks: [ homeia-network ]

  construction-service:
    build: { context: ./apps/construction-service }
    ports: [ "3006:3000" ]
    networks: [ homeia-network ]

  urban-service:
    build: { context: ./apps/urban-service }
    ports: [ "3007:3000" ]
    networks: [ homeia-network ]

  marketplace-service:
    build: { context: ./apps/marketplace-service }
    ports: [ "3008:3000" ]
    networks: [ homeia-network ]

  # Web Frontend
  web:
    build: { context: ./apps/web }
    ports: [ "3001:3000" ]
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      - HOSTNAME=0.0.0.0
      - PORT=3000
    networks: [ homeia-network ]

networks:
  homeia-network:
    driver: bridge

volumes:
  postgres_data:
